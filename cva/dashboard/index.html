<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CVA — Candidate Visual Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: { 50: '#f0f9ff', 500: '#0ea5e9', 900: '#0c4a6e' },
            },
          },
        },
      };
    </script>
    <style>
      body { background: #0f172a; font-family: 'Inter', sans-serif; }
      .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
      .badge-active  { background: #16a34a22; color: #4ade80; border: 1px solid #16a34a55; }
      .badge-skipped { background: #ca8a0422; color: #fbbf24; border: 1px solid #ca8a0455; }
      .badge-degraded{ background: #dc262622; color: #f87171; border: 1px solid #dc262655; }
      .score-ring { transition: stroke-dashoffset 0.6s ease; }
      .flag-enter { animation: slideIn 0.3s ease; }
      @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    </style>
  </head>
  <body class="min-h-screen text-slate-100">
    <div id="app"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
